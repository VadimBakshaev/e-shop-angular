<section class="favorite">
    <div class="container">
        <h2 class="favorite-title">Избранное</h2>
        @if(products().length>0){
        <div class="favorite-products">
            @for (product of products(); track product.id) {
            <div class="favorite-product">
                <div class="favorite-product-image" style="background-image: url('{{serverDefault + product.image}}');"
                    routerLink="/product/{{product.url}}">
                </div>
                <div class="favorite-product-name">{{product.name}}</div>
                <div class="favorite-product-price">{{product.price}} BYN</div>
                <div class="favorite-product-count" [class.show]="product.isInCart">
                    <count-selector [count]="product.quantity"
                        (onCountChange)="updateCartQuantity(product.id, $event)"></count-selector>
                </div>
                <div class="favorite-product-action">
                    @if (product.isInCart) {
                    <button class="btn btn-transparent" (click)="updateCartQuantity(product.id, 0)">В корзине</button>
                    } @else {
                    <button class="btn" (click)="updateCartQuantity(product.id, 1)">В корзину</button>
                    }
                </div>
                <div class="favorite-product-remove" (click)="removeFromFavorites(product.id)">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <line x1="1.93562" y1="2.6499" x2="13.9564" y2="14.6707" stroke="#A8ABA7"
                            stroke-linecap="round" />
                        <line x1="13.9238" y1="2.62996" x2="1.90301" y2="14.6508" stroke="#A8ABA7"
                            stroke-linecap="round" />
                    </svg>
                </div>
            </div>
            }
        </div>
        } @else {
        <div class="favorite-empty">
            <h2 class="favorite-empty-text">Нет товаров</h2>
            <button class="btn" routerLink="/catalog">В каталог</button>
        </div>
        }
    </div>
</section>
